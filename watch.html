<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاهدة — الإثراء الديني</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1a472a; --green-md:#2d6a4f; --green-lt:#40916c;
  --gold:#c9a84c; --gold-lt:#e9c46a;
  --silver:#b0b7c3; --white:#f0ece4;
  --bg:#0a0e0b; --bg2:#0f1610; --bg3:#141d15; --bg4:#1a2419;
  --border:rgba(201,168,76,.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--white);font-family:'Tajawal',sans-serif;}

/* ══ loader ══ */
#loader{position:fixed;inset:0;z-index:500;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#loader.hide{display:none;}
.ld-ring{position:relative;width:60px;height:60px;display:flex;align-items:center;justify-content:center;}
.ld-ring::before{content:'';position:absolute;inset:0;border-radius:50%;
  border:2px solid transparent;border-top-color:var(--gold);animation:spin 1.2s linear infinite;}
.ld-ring::after{content:'';position:absolute;inset:8px;border-radius:50%;
  border:1px solid transparent;border-bottom-color:var(--green-lt);animation:spin 2s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-icon{font-size:1.6rem;}
.ld-txt{font-family:'Amiri',serif;font-size:1rem;color:var(--gold);}

/* ══ شاشة لا يوجد بث ══ */
#no-live{position:fixed;inset:0;z-index:400;background:var(--bg);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:20px;}
#no-live.show{display:flex;}
.no-live-icon{font-size:3.5rem;opacity:.4;}
.no-live-title{font-family:'Amiri',serif;font-size:1.4rem;color:var(--white);}
.no-live-sub{font-size:.8rem;color:var(--silver);max-width:300px;line-height:1.8;}
.no-live-time{font-size:.72rem;color:rgba(201,168,76,.5);margin-top:4px;}

/* ══ المشغل الرئيسي ══ */
#player-wrap{position:fixed;inset:0;background:#000;}
#yt-frame{position:absolute;inset:0;width:100%;height:100%;}
#yt-frame iframe, #yt-frame > div{width:100%;height:100%;}
#sub-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;}
#click-layer{position:absolute;inset:0;z-index:6;cursor:pointer;}

/* ══ header شفاف ══ */
#watch-header{position:absolute;top:0;left:0;right:0;z-index:20;
  padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);
  opacity:0;transition:opacity .3s;pointer-events:none;}
#watch-header.visible{opacity:1;pointer-events:all;}
.wh-back{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--white);font-size:.85rem;text-decoration:none;}
.wh-title{font-family:'Amiri',serif;font-size:.9rem;color:var(--white);
  text-align:center;flex:1;padding:0 10px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wh-live-badge{display:flex;align-items:center;gap:4px;padding:3px 9px;
  background:rgba(220,50,50,.85);border-radius:4px;font-size:.62rem;color:#fff;font-weight:700;}
.wh-live-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ══ controls ══ */
#controls{position:absolute;bottom:0;left:0;right:0;z-index:20;
  padding:0 16px 16px;
  background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
  opacity:0;transition:opacity .3s;pointer-events:none;}
#controls.visible{opacity:1;pointer-events:all;}
.ctrl-row1{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ctrl-btn{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;}
.ctrl-btn svg{width:14px;height:14px;fill:var(--white);}
.time-wrap{flex:1;display:flex;align-items:center;gap:8px;}
.time-txt{font-size:.68rem;color:rgba(255,255,255,.7);white-space:nowrap;min-width:34px;}
.seek-bar{flex:1;-webkit-appearance:none;height:3px;background:rgba(255,255,255,.2);
  border-radius:2px;outline:none;cursor:pointer;}
.seek-bar::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--gold);cursor:pointer;}
.vol-wrap{display:flex;align-items:center;gap:6px;}
.vol-bar{width:60px;-webkit-appearance:none;height:3px;background:rgba(255,255,255,.2);
  border-radius:2px;outline:none;cursor:pointer;}
.vol-bar::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;
  border-radius:50%;background:#fff;cursor:pointer;}
.ctrl-row2{display:flex;align-items:center;justify-content:space-between;}
.lang-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;
  background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.8);font-size:.75rem;font-family:'Tajawal',sans-serif;cursor:pointer;
  transition:all .2s;}
.lang-btn:hover{border-color:rgba(201,168,76,.4);color:var(--gold);}
.fs-btn{width:32px;height:32px;border-radius:6px;background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.fs-btn svg{width:14px;height:14px;fill:var(--white);}

/* ══ لوحة اختيار اللغة ══ */
.lang-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);
  opacity:0;pointer-events:none;transition:opacity .3s;}
.lang-overlay.open{opacity:1;pointer-events:all;}
#lang-panel{position:fixed;bottom:0;left:0;right:0;z-index:101;
  background:var(--bg3);border-top:1px solid var(--border);
  border-radius:18px 18px 0 0;padding:16px 20px 36px;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  max-height:70vh;overflow-y:auto;}
#lang-panel.open{transform:translateY(0);}
.lp-handle{width:36px;height:3px;background:rgba(255,255,255,.12);border-radius:2px;margin:0 auto 16px;}
.lp-title{font-family:'Amiri',serif;font-size:1rem;color:var(--white);margin-bottom:6px;}
.lp-tabs{display:flex;gap:8px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:12px;}
.lp-tab{padding:5px 14px;border-radius:20px;font-size:.74rem;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;}
.lp-tab.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);color:var(--gold);}
.lp-section{display:none;}
.lp-section.active{display:block;}
.lp-langs{display:flex;flex-wrap:wrap;gap:8px;}
.lp-lang{padding:7px 16px;border-radius:20px;font-size:.78rem;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:rgba(240,236,228,.65);cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .2s;}
.lp-lang:hover{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.2);}
.lp-lang.active{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.4);color:var(--gold);}
.lp-lang.no-audio{opacity:.5;}
.lp-orig{padding:7px 16px;border-radius:20px;font-size:.78rem;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  color:var(--white);cursor:pointer;font-family:'Tajawal',sans-serif;margin-bottom:10px;}
.lp-orig.active{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.4);color:var(--gold);}
.lp-empty{font-size:.78rem;color:rgba(255,255,255,.3);padding:12px 0;}

/* ══ toast ══ */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);
  background:rgba(20,29,21,.95);border:1px solid var(--border);border-radius:8px;
  padding:8px 18px;font-size:.76rem;color:var(--white);
  opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══ black screen (موقوف / تحميل) ══ */
#black-screen{position:absolute;inset:0;z-index:8;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;}
#black-screen.hide{display:none;}
#black-screen.paused #bs-play-btn{background:rgba(255,255,255,.08);}
#black-screen span{font-size:.8rem;color:rgba(255,255,255,.4);letter-spacing:1px;}
#bs-play-btn:hover{background:rgba(255,255,255,.22) !important;}
#yt-frame{opacity:0;transition:opacity .3s;}

/* ══ حالة الاتصال OBS ══ */
#obs-status{position:absolute;top:60px;right:12px;z-index:15;
  font-size:.65rem;color:rgba(255,255,255,.4);display:none;}
.obs-lang-dot{display:inline-block;width:5px;height:5px;border-radius:50%;
  background:#666;margin-left:4px;}
.obs-lang-dot.on{background:#22c55e;}
</style>
</head>
<body>

<!-- loader -->
<div id="loader">
  <div class="ld-ring"><span class="ld-icon">🕌</span></div>
  <div class="ld-txt" id="ld-txt">جاري التحميل...</div>
</div>

<!-- لا يوجد بث -->
<div id="no-live">
  <div class="no-live-icon">📡</div>
  <div class="no-live-title" id="no-live-title">لا يوجد بث حالياً</div>
  <div class="no-live-sub" id="no-live-sub">ستبدأ البث قريباً — يُرجى الانتظار</div>
  <div class="no-live-time" id="no-live-time"></div>
</div>

<!-- المشغل -->
<div id="player-wrap" style="display:none">
  <div id="yt-frame"></div>
  <canvas id="sub-canvas"></canvas>
  <div id="click-layer" onclick="togglePlay()"></div>
  <div id="black-screen" onclick="tapToPlay()">
    <div id="bs-play-btn" style="width:72px;height:72px;border-radius:50%;
      background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);
      display:flex;align-items:center;justify-content:center;margin-bottom:10px;
      transition:background .2s;cursor:pointer;">
      <svg viewBox="0 0 24 24" style="width:32px;height:32px;fill:#fff;margin-right:-3px">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </div>
    <span id="bs-txt">اضغط للتشغيل</span>
  </div>
  <div id="obs-status"></div>

  <!-- header -->
  <div id="watch-header">
    <a class="wh-back" href="index.html">←</a>
    <div class="wh-title" id="watch-title">—</div>
    <div class="wh-live-badge" id="live-badge" style="display:none">
      <span class="wh-live-dot"></span> LIVE
    </div>
  </div>

  <!-- controls -->
  <div id="controls">
    <div class="ctrl-row1">
      <div class="ctrl-btn" onclick="togglePlay()">
        <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="time-wrap">
        <span class="time-txt" id="time-cur">0:00</span>
        <input type="range" class="seek-bar" id="seek-bar" min="0" max="100" value="0"
          oninput="seekTo(this.value)" style="direction:ltr">
        <span class="time-txt" id="time-dur">0:00</span>
      </div>
      <div class="vol-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,.6)">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
        </svg>
        <input type="range" class="vol-bar" id="vol-bar" min="0" max="100" value="90"
          oninput="setVol(this.value)" style="direction:ltr">
      </div>
    </div>
    <div class="ctrl-row2">
      <button class="lang-btn" onclick="openLangPanel()">
        🌐 <span id="lang-btn-txt">اختر اللغة</span>
      </button>
      <div class="fs-btn" onclick="toggleFS()">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </div>
    </div>
  </div>
</div>

<!-- لوحة اللغة -->
<div class="lang-overlay" id="lang-overlay" onclick="closeLangPanel()"></div>
<div id="lang-panel">
  <div class="lp-handle"></div>
  <div class="lp-title">🌐 اختر اللغة</div>
  <div class="lp-tabs">
    <div class="lp-tab active" id="tab-sub" onclick="switchLpTab('sub',this)">💬 ترجمة نصية</div>
    <div class="lp-tab" id="tab-audio" onclick="switchLpTab('audio',this)">🔊 ترجمة صوتية</div>
  </div>
  <div class="lp-section active" id="sec-sub">
    <div class="lp-langs" id="sub-langs"></div>
  </div>
  <div class="lp-section" id="sec-audio">
    <div class="lp-langs" id="audio-langs"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ Supabase ══
var SUPA_URL = 'https://umowxqalocwyrnvcuhyh.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtb3d4cWFsb2N3eXJudmN1aHloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzMyMDIsImV4cCI6MjA4ODY0OTIwMn0.Tqaz8x6aKmdiBWYXEx4ujNdk0kiJgyRJ_Kk2OS-Yv0E';

async function supa(table, params) {
  var url = SUPA_URL + '/rest/v1/' + table + '?' + (params||'');
  var r = await fetch(url, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ══ حالة ══
var ST = {
  mode: 'none',       // none | sync | obs
  syncStart: null,    // timestamp بدء التزامن
  subDelay: 0,        // تأخير الترجمة النصية (ثواني)
  audioDelay: 0,      // تأخير الترجمة الصوتية (ثواني)
  session: null,
  langs: [],          // لغات البث
  playing: false,
  vol: 90,
  activeSub: -1,      // إندكس الترجمة النصية (-1=إيقاف)
  activeAudio: -2,    // -2=أصلي، -1=كتم، i=لغة
  feedback: 0,
  rafId: null,
  subs: [],           // [{name, events}]
  audioEls: {},       // idx -> Audio
  obsWs: {},          // idx -> WebSocket
  obsTexts: {},       // idx -> currentText
  ctrlTimer: null,
  isLive: false,
  contentId: null
};

var ytPlayer = null;
var ytReady = false;

// ══ YouTube API ══
window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  if (ST._pendingId) { createYTPlayer(ST._pendingId); ST._pendingId = null; }
};

function loadYTApi() {
  if (window.YT) { ytReady = true; return; }
  var s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
}

function createYTPlayer(videoId) {
  document.getElementById('yt-frame').innerHTML = '';
  ytPlayer = new YT.Player('yt-frame', {
    videoId: videoId,
    playerVars: { autoplay:1, controls:0, rel:0, modestbranding:1,
                  iv_load_policy:3, disablekb:1, fs:0, playsinline:1 },
    events: {
      onReady: function(e) {
        e.target.setVolume(ST.vol);
        e.target.playVideo();
        ST.playing = true;
        updatePlayIcon();
        startLoop();
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.PLAYING) {
          ST.playing=true; updatePlayIcon();
          document.getElementById('black-screen').classList.add('hide');
          document.getElementById('black-screen').classList.remove('paused');
          document.getElementById('yt-frame').style.opacity='1';
          if (ST.activeAudio >= 0 && (ST.mode !== 'sync' || ST.syncStart)) {
            var _pa=ST.audioEls[ST.activeAudio];
            if (_pa) { if(typeof _pa.playVideo==='function') _pa.playVideo(); else _pa.play().catch(function(){}); }
          }
        }
        if (e.data === YT.PlayerState.PAUSED) {
          ST.playing=false; updatePlayIcon();
          document.getElementById('bs-txt').textContent = 'موقوف مؤقتاً';
          document.getElementById('black-screen').classList.remove('hide');
          document.getElementById('black-screen').classList.add('paused');
          Object.keys(ST.audioEls).forEach(function(i){ var _a=ST.audioEls[i]; if(!_a)return; if(typeof _a.pauseVideo==='function') _a.pauseVideo(); else _a.pause(); });
        }
        if (e.data === YT.PlayerState.ENDED) {
          ST.playing=false; updatePlayIcon();
          document.getElementById('bs-txt').textContent = 'انتهى الفيديو';
          document.getElementById('black-screen').classList.remove('hide');
          Object.keys(ST.audioEls).forEach(function(i){ var _a=ST.audioEls[i]; if(!_a)return; if(typeof _a.pauseVideo==='function') _a.pauseVideo(); else _a.pause(); });
        }
      }
    }
  });
}

// ══ تهيئة ══
window.addEventListener('load', function() {
  loadYTApi();
  initWatch();
});

async function initWatch() {
  var params = new URLSearchParams(window.location.search);
  var pageId = params.get('page');
  if (pageId) {
    await loadPage(pageId);
  } else {
    // بدون ID — ابحث عن أي صفحة جارية
    await checkLivePage();
  }
}

// ══ تحميل صفحة بـ ID ══
async function loadPage(id) {
  try {
    setLoaderTxt('جاري تحميل الصفحة...');
    var data = await supa('pages', 'select=*&id=eq.' + id + '&limit=1');
    if (!data || !data[0]) { showNoLive('الصفحة غير موجودة', ''); return; }
    var page = data[0];

    var langs = await supa('page_langs', 'select=*&page_id=eq.' + id + '&order=sort_order');
    ST.langs = langs || [];
    ST.session = page;
    ST.feedback   = page.feedback    || 0;
    ST.subDelay   = parseFloat(page.sub_delay   || 0);
    ST.audioDelay = parseFloat(page.audio_delay || 0);

    // تحديد الوضع
    if (page.status === 'upcoming') {
      hideLoader();
      showNoLive('يبدأ البث قريباً', page.title_ar || '');
      startRealtimePage(id);
      return;
    }
    if (page.status === 'ended' || page.status === 'recorded') {
      ST.mode = 'recorded';
    } else {
      ST.mode = page.category || 'sync'; // live → sync أو obs
    }

    document.getElementById('watch-title').textContent = page.title_ar || page.title_en || 'بث مباشر';
    var isLive = page.status === 'live';
    document.getElementById('live-badge').style.display = isLive ? 'flex' : 'none';

    if (ST.mode === 'sync' || ST.mode === 'recorded') {
      await loadSubtitleFiles();
      ST.langs.forEach(function(l, i) {
        if (l.audio_url) { var _a=new Audio(l.audio_url); _a.volume=0; _a.preload='auto'; ST.audioEls[i]=_a; }
        else if (l.yt_audio_url) loadYTAudio(i, l.yt_audio_url);
        else if (l.icecast_url)  loadIcecast(i, l.icecast_url);
      });
    }
    // sync_start — لا نأخذه من قاعدة البيانات عند التحميل أبداً
    // الـ realtime وحده هو من يفعّله عند ضغط المشرف "بدأ التزامن"
    ST.syncStart = null;
    ST.activeAudio = -2;  // الصوت الأصلي افتراضياً
    ST.activeSub = -1;    // لا ترجمة نصية
    buildLangPanel();
    // sync — لا تشغّل الترجمة حتى يضغط المشرف "بدأ التزامن"
    // recorded — اختر أول ترجمة تلقائياً فقط
    if (ST.mode === 'recorded') {
      for (var _si=0; _si<ST.langs.length; _si++) {
        if (ST.subs[_si] && ST.subs[_si].events && ST.subs[_si].events.length) { setSub(_si); break; }
      }
    }
    showPlayer();
    startCtrlHide();

    var ytId = extractYTId(page.yt_url);
    if (ytId) {
      if (ytReady) createYTPlayer(ytId);
      else ST._pendingId = ytId;
    }
    if (ST.mode === 'obs') connectAllOBS();

    hideLoader();
    // ابدأ الاستماع دائماً في وضع sync بغض النظر عن isLive
    if (ST.mode === 'sync' || isLive) startRealtimePage(id);
  } catch(e) {
    hideLoader();
    showNoLive('خطأ في التحميل', e.message);
  }
}

// ══ بحث عن صفحة جارية ══
async function checkLivePage() {
  try {
    setLoaderTxt('جاري الاتصال...');
    var data = await supa('pages', 'select=*&status=eq.live&order=updated_at.desc&limit=1');
    if (!data || !data[0]) {
      hideLoader();
      showNoLive('لا يوجد بث مباشر حالياً', 'سيبدأ البث قريباً — يُرجى الانتظار');
      startPollingLive();
      return;
    }
    await loadPage(data[0].id);
  } catch(e) {
    hideLoader();
    showNoLive('خطأ في الاتصال', 'تأكد من اتصالك بالإنترنت');
  }
}

// ══ تحميل ملفات الترجمة ══
async function loadSubtitleFiles() {
  ST.subs = [];
  for (var i = 0; i < ST.langs.length; i++) {
    var l = ST.langs[i];
    var url = l.subtitle_url;
    if (!url) { ST.subs.push(null); continue; }
    try {
      var ctrl = new AbortController();
      var tid = setTimeout(function(){ ctrl.abort(); }, 8000); // timeout 8 ثواني
      var r = await fetch(url, { signal: ctrl.signal });
      clearTimeout(tid);
      var txt = await r.text();
      var isSRT = url.toLowerCase().includes('.srt');
      var events = isSRT ? parseSRT(txt) : parseASS(txt);
      ST.subs.push({ name: l.name, events: events });
    } catch(e) { ST.subs.push(null); }
  }
}

function connectAllOBS() {
  ST.langs.forEach(function(l, i) {
    if (l.yt_audio_url) loadYTAudio(i, l.yt_audio_url);
    else if (l.icecast_url) loadIcecast(i, l.icecast_url);
  });

function startObsRealtime() {
  var url = SUPA_URL.replace('https://','wss://') + '/realtime/v1/websocket?apikey=' + SUPA_KEY + '&vsn=1.0.0';
  var ws = new WebSocket(url);
  ws.onopen = function() {
    ws.send(JSON.stringify({ topic:'realtime:public:page_langs', event:'phx_join', payload:{}, ref:'obs1' }));
  };
  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    if (!msg.payload || !msg.payload.record || msg.payload.type !== 'UPDATE') return;
    var r = msg.payload.record;
    // ابحث عن اللغة المناسبة
    ST.langs.forEach(function(l, i) {
      if (l.id && String(l.id) === String(r.id) && r.obs_text !== undefined) {
        ST.obsTexts[i] = r.obs_text || '';
        if (ST.activeSub === i) drawSubText(ST.obsTexts[i]);
        updateObsDot(i, true);
      }
    });
  };
  ws.onclose = function() {
    setTimeout(startObsRealtime, 5000);
  };
}

function loadYTAudio(idx, url) {

// ══ التحكم بالصوت ══
function setAudio(idx) {
  ST.activeAudio = idx;
  // أوقف كل الصوتيات
  Object.keys(ST.audioEls).forEach(function(i) {
    var el = ST.audioEls[i];
    if (!el) return;
    if (typeof el.pauseVideo === 'function') { el.pauseVideo(); el.setVolume(0); }
    else { el.pause(); el.volume = 0; }
  });
  if (idx === -2) {
    // أصلي — تأكد رفع الكتم وضبط الصوت
    if (ytPlayer && typeof ytPlayer.unMute === 'function') { ytPlayer.unMute(); ytPlayer.setVolume(ST.vol); }
    document.getElementById('lang-btn-txt').textContent = 'الصوت الأصلي';
    updateLangBtnHighlight('audio', -2);
  } else if (idx === -1) {
    if (ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(0);
    document.getElementById('lang-btn-txt').textContent = 'صوت مكتوم';
    updateLangBtnHighlight('audio', -1);
  } else {
    var el = ST.audioEls[idx];
    if (el) {
      // صوت يوتيوب الاختياري لفئتي sync و recorded: شغّل مباشرة بنفس منطق OBS
      if ((ST.mode === 'sync' || ST.mode === 'recorded') && typeof el.seekTo === 'function') {
        el.seekTo(0, true);
        el.unMute && el.unMute();
        el.setVolume && el.setVolume(ST.vol);
        el.playVideo && el.playVideo();
      } else if (ST.mode === 'sync') {
        // sync للصوت العادي فقط — أوقفه، والـ loop يشغله بعد syncStart + audioDelay
        el.volume = 0;
        if (typeof el.setVolume === 'function') el.setVolume(0);
        if (typeof el.pauseVideo === 'function') el.pauseVideo(); else el.pause();
      } else if (ST.mode === 'obs') {
        // obs — شغّل الصوت مباشرة من البداية
        if (typeof el.seekTo === 'function') { el.seekTo(0, true); el.unMute && el.unMute(); el.setVolume(ST.vol); el.playVideo(); }
        else { el.currentTime = 0; el.volume = ST.vol / 100; el.play().catch(function(){}); }
      } else {
        var _vt = ytPlayer && ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0;
        if (_vt < ST.audioDelay) {
          el.volume = 0;
          if (typeof el.pauseVideo === 'function') el.pauseVideo(); else el.pause();
        } else {
          var _at = _vt - ST.audioDelay;
          if (typeof el.seekTo === 'function') {
            el.seekTo(_at, true);
            el.unMute && el.unMute();
            el.setVolume && el.setVolume(ST.vol);
            el.playVideo && el.playVideo();
          }
          else { el.currentTime = _at; el.volume = ST.vol / 100; if (ST.playing) el.play().catch(function(){}); }
        }
      }
    }
    // feedback — الصوت الأصلي في الخلفية
    if (ytPlayer && typeof ytPlayer.mute === 'function') {
      if (ST.feedback <= 0) ytPlayer.mute();
      else { ytPlayer.unMute(); ytPlayer.setVolume(ST.feedback); }
    }
    var name = ST.langs[idx] ? ST.langs[idx].name : ('لغة '+(idx+1));
    document.getElementById('lang-btn-txt').textContent = '🔊 ' + name;
    updateLangBtnHighlight('audio', idx);
  }
  // تحديث الأزرار
  document.querySelectorAll('#audio-langs .lp-lang, .lp-orig').forEach(function(b){ b.classList.remove('active'); });
  if (idx === -2 && document.getElementById('lp-orig-audio')) document.getElementById('lp-orig-audio').classList.add('active');
  if (idx >= 0 && document.getElementById('lp-aud-'+idx)) document.getElementById('lp-aud-'+idx).classList.add('active');
}

  if (idx === -1) {

  }
}

// ══ loop الرئيسي ══
function startLoop() {
  cancelAnimationFrame(ST.rafId);
  function loop() {
    var t = ytPlayer && ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0;
    if (ytPlayer && ytPlayer.getCurrentTime) updateSeek(t);

    // ── الترجمة النصية ──
    if (ST.activeSub >= 0 && ST.mode !== 'obs') {
      if (ST.mode === 'sync' && ST.syncStart) {
        // sync: الوقت من لحظة ضغط التزامن + تأخير
        var elapsed = (Date.now() - ST.syncStart) / 1000 - ST.subDelay;
        drawSubFromFile(Math.max(0, elapsed));
      } else if (ST.mode === 'recorded') {
        // recorded: الوقت من الفيديو + تأخير
        drawSubFromFile(Math.max(0, t - ST.subDelay));
      }
    }

    // ── الترجمة الصوتية ──
    if (ST.activeAudio >= 0 && ST.playing && (ST.mode !== 'sync' || ST.syncStart)) {
      var _ael = ST.audioEls[ST.activeAudio];
      if (_ael) {
        var _isPaused = typeof _ael.getPlayerState === 'function'
          ? _ael.getPlayerState() !== 1
          : _ael.paused;
        if (ST.mode === 'recorded') {
          // recorded: شغّل بعد audioDelay من الفيديو
          if (t >= ST.audioDelay && _isPaused) {
            var _at = t - ST.audioDelay;
            if (typeof _ael.seekTo === 'function') { _ael.seekTo(_at, true); _ael.setVolume(ST.vol); _ael.playVideo(); }
            else { _ael.currentTime = _at; _ael.volume = ST.vol / 100; _ael.play().catch(function(){}); }
          }
        } else if (ST.mode === 'sync' && ST.syncStart) {
          // sync: شغّل بعد audioDelay من لحظة التزامن — مرة واحدة فقط
          var elapsed2 = (Date.now() - ST.syncStart) / 1000;
          if (elapsed2 >= ST.audioDelay && _isPaused) {
            var _at2 = elapsed2 - ST.audioDelay;
            if (typeof _ael.seekTo === 'function') {
              _ael.seekTo(_at2, true);
              _ael.unMute && _ael.unMute();
              _ael.setVolume(ST.vol);
              _ael.playVideo();
            } else {
              _ael.currentTime = _at2;
              _ael.volume = ST.vol / 100;
              _ael.play().catch(function(){});
            }
          }
        }
      }
    }

    ST.rafId = requestAnimationFrame(loop);
  }
  loop();
}

// ══ رسم الترجمة من ملف ══
function drawSubFromFile(t) {
  var sub = ST.subs[ST.activeSub];
  if (!sub || !sub.events) { clearCanvas(); return; }
  var active = sub.events.filter(function(e){ return t >= e.startSec && t < e.endSec; });
  var text = active.map(function(e){ return e.cleanText; }).join('\n');
  drawSubText(text);
}

function drawSubText(text) {
  var canvas = document.getElementById('sub-canvas');
  var ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if (!text || !text.trim()) return;

  var fontSize = Math.round(canvas.height * 0.038);
  ctx.font = 'bold ' + fontSize + 'px Tajawal, Arial, sans-serif';
  ctx.direction = 'rtl';
  ctx.textAlign = 'center';
  var maxW = canvas.width * 0.82;
  var lineH = fontSize * 1.55;
  var lines = [];
  text.split(/\n|\\n/).forEach(function(part) {
    if (!part.trim()) return;
    wrapText(ctx, part.trim(), maxW).forEach(function(l){ lines.push(l); });
  });
  if (!lines.length) return;
  var totalH = lines.length * lineH;
  var y = canvas.height * 0.88 - totalH;
  lines.forEach(function(line) {
    var x = canvas.width / 2;
    var tw = ctx.measureText(line).width;
    ctx.fillStyle = 'rgba(0,0,0,.65)';
    ctx.beginPath();
    ctx.roundRect(x - tw/2 - 10, y - fontSize, tw + 20, fontSize*1.4, 4);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,.8)';
    ctx.shadowBlur = 6;
    ctx.fillText(line, x, y);
    ctx.shadowBlur = 0;
    y += lineH;
  });
}

function wrapText(ctx, text, maxW) {
  var words = text.split(' '), lines = [], cur = '';
  words.forEach(function(w) {
    var test = cur ? cur+' '+w : w;
    if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
    else cur = test;
  });
  if (cur) lines.push(cur);
  return lines;
}

function clearCanvas() {
  var canvas = document.getElementById('sub-canvas');
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

function setVol(v) {

      if (ST.feedback <= 0) ytPlayer.mute();

    }
  }
}

function fmtTime(s) {
  var h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60);
  if (h>0) return h+':'+(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;
  return m+':'+(sec<10?'0':'')+sec;
}

// ══ Realtime — يستمع لتغييرات الصفحة ══
function startRealtimePage(pageId) {
  var url = SUPA_URL.replace('https://','wss://') + '/realtime/v1/websocket?apikey=' + SUPA_KEY + '&vsn=1.0.0';
  var ws = new WebSocket(url);
  ws.onopen = function() {
    ws.send(JSON.stringify({ topic:'realtime:public:pages', event:'phx_join', payload:{}, ref:'1' }));
  };
  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    console.log('[RT raw]', JSON.stringify(msg).substring(0, 200));
    // فقط رسائل UPDATE الحقيقية من postgres_changes
    if (!msg.payload || !msg.payload.record || msg.payload.type !== 'UPDATE') return;
    var s = msg.payload.record;
    console.log('[RT] id='+s.id+' pageId='+pageId+' sync_start='+s.sync_start+' status='+s.status);
    if (String(s.id) !== String(pageId)) return;
    // تغيير الحالة
    if (s.status === 'upcoming') {
      showNoLive('يبدأ البث قريباً', s.title_ar || '');
      document.getElementById('player-wrap').style.display = 'none';
    } else if (s.status === 'ended' || s.status === 'recorded') {
      showNoLive('انتهى البث', 'شكراً لمتابعتكم');
      document.getElementById('player-wrap').style.display = 'none';
    } else if (s.status === 'live' && ST.mode === 'none') {
      document.getElementById('no-live').classList.remove('show');
      loadPage(pageId);
    }
    // تحديث sync_start
    if (typeof s.sync_start !== 'undefined') {
      if (s.sync_start && ST.mode === 'sync') {
        // سجّل وقت البدء — الـ loop يتكفل بالترجمة والصوت
        ST.syncStart = Date.now(); // وقت الاستلام وليس وقت الـ server
        // اختر أول ترجمة نصية تلقائياً إذا لم يختر المشاهد
        if (ST.activeSub < 0) {
          for (var _ri=0; _ri<ST.langs.length; _ri++) {
            if (ST.subs[_ri] && ST.subs[_ri].events && ST.subs[_ri].events.length) { setSub(_ri); break; }
          }
        }
        // كتم الفيديو الأصلي إذا اختار المشاهد لغة مترجمة
        if (ST.activeAudio >= 0 && ytPlayer) {
          if (ytPlayer && typeof ytPlayer.mute === 'function') {
            if (ST.feedback <= 0) ytPlayer.mute();
            else { ytPlayer.unMute(); ytPlayer.setVolume(ST.feedback); }
          }
        }
      } else {
        // أوقف التزامن — أوقف كل شيء
        ST.syncStart = null;
        ST.activeSub = -1;
        clearCanvas();
        Object.keys(ST.audioEls).forEach(function(i){
          var _a = ST.audioEls[i]; if (!_a) return;
          if (typeof _a.pauseVideo === 'function') _a.pauseVideo(); else _a.pause();
        });
        if (ytPlayer && typeof ytPlayer.unMute === 'function') { ytPlayer.unMute(); ytPlayer.setVolume(ST.vol); }
        ST.activeAudio = -2;
        document.getElementById('lang-btn-txt').textContent = 'الصوت الأصلي';
      }
    }
    // تحديث feedback
    if (s.feedback !== undefined) {
      ST.feedback = s.feedback;
      if (ST.activeAudio >= 0 && ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(ST.feedback);
    }
  };
  ws.onclose = function() { setTimeout(function(){ startRealtimePage(pageId); }, 5000); };
}

// ══ parse SRT ══
function parseSRT(text) {
  var events=[];
  text.trim().split(/\r?\n\r?\n/).forEach(function(block) {
    var lines=block.split(/\r?\n/); if(lines.length<3) return;
    var t=lines[1].match(/(\d+:\d+:\d+[,\.]\d+)\s*-->\s*(\d+:\d+:\d+[,\.]\d+)/); if(!t) return;
    var txt=lines.slice(2).join('\n').replace(/<[^>]+>/g,'').trim(); if(!txt) return;
    events.push({startSec:srts(t[1]),endSec:srts(t[2]),cleanText:txt});
  });
  return events;
}
function srts(t){t=t.replace(',','.');var p=t.split(':');return parseInt(p[0])*3600+parseInt(p[1])*60+parseFloat(p[2]);}

// ══ parse ASS ══
function parseASS(text) {
  var events=[],lines=text.split(/\r?\n/),inEv=false,fmt=[];
  lines.forEach(function(line) {
    line=line.trim();
    if(line==='[Events]'){inEv=true;return;}
    if(line.startsWith('[')&&line!=='[Events]'){inEv=false;return;}
    if(!inEv) return;
    if(line.startsWith('Format:')) fmt=line.replace('Format:','').split(',').map(function(s){return s.trim();});
    if(line.startsWith('Dialogue:')) {
      var parts=line.replace('Dialogue:','').split(',');
      var obj={};
      for(var j=0;j<fmt.length&&j<parts.length;j++){
        if(fmt[j]==='Text'){obj.Text=parts.slice(j).join(',').trim();break;}
        obj[fmt[j]]=parts[j].trim();
      }
      obj.startSec=assTime(obj.Start); obj.endSec=assTime(obj.End);
      obj.cleanText=obj.Text?(obj.Text.replace(/\{[^}]*\}/g,'').replace(/\\N/g,'\n').replace(/\\n/g,'\n').trim()):'';
      if(obj.cleanText) events.push(obj);
    }
  });
  return events;
}
function assTime(t){if(!t)return 0;var p=t.split(':');return parseInt(p[0])*3600+parseInt(p[1])*60+parseFloat(p[2]);}

// ══ extract YouTube ID ══
function extractYTId(url) {
  if (!url) return '';
  var m = url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : '';
}

// ══ UI helpers ══
function showPlayer() {
  document.getElementById('player-wrap').style.display = 'block';
  document.getElementById('no-live').classList.remove('show');
}
function showNoLive(title, sub) {
  document.getElementById('no-live-title').textContent = title || 'لا يوجد بث';
  document.getElementById('no-live-sub').textContent = sub || '';
  document.getElementById('no-live').classList.add('show');
  document.getElementById('player-wrap').style.display = 'none';
  document.getElementById('no-live-time').textContent = 'آخر فحص: ' + new Date().toLocaleTimeString('ar');
}
function hideLoader() { document.getElementById('loader').classList.add('hide'); }
function setLoaderTxt(t) { document.getElementById('ld-txt').textContent = t; }

var toastT;
function toast(msg) {
  var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(function(){el.classList.remove('show');},2500);
}
