<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاهدة — الإثراء الديني</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:'Tajawal',sans-serif;
overflow:hidden
}

#player-wrap{
position:fixed;
inset:0;
background:#000
}

#yt-frame{
position:absolute;
inset:0;
width:100%;
height:100%
}

#sub-canvas{
position:absolute;
inset:0;
pointer-events:none;
z-index:5
}

#controls{
position:absolute;
bottom:0;
left:0;
right:0;
padding:10px;
background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
display:flex;
align-items:center;
gap:10px
}

.ctrl-btn{
width:34px;
height:34px;
border-radius:50%;
background:rgba(255,255,255,.15);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer
}

.seek{
flex:1
}

.lang-btn{
background:rgba(255,255,255,.15);
border:none;
color:#fff;
padding:6px 12px;
border-radius:20px;
cursor:pointer
}

</style>
</head>

<body>

<div id="player-wrap">

<div id="yt-frame"></div>

<canvas id="sub-canvas"></canvas>

<div id="controls">

<div class="ctrl-btn" onclick="togglePlay()">▶</div>

<input type="range" class="seek" id="seek" min="0" max="100">

<button class="lang-btn" onclick="openLang()">🌐 اللغة</button>

</div>

</div>

<script>

var ytPlayer=null

var ST={
vol:90,
activeAudio:0,
audioEls:{}
}

function loadYT(id){

ytPlayer=new YT.Player('yt-frame',{
videoId:id,
playerVars:{
autoplay:1,
controls:0,
rel:0,
modestbranding:1,
playsinline:1
},
events:{
onReady:function(e){

e.target.setVolume(ST.vol)
e.target.playVideo()

startAudio()

}
}
})

}

function startAudio(){

if(ST.audioEls[ST.activeAudio]){

var a=ST.audioEls[ST.activeAudio]

a.volume=1

a.play().catch(()=>{})

}

}

function togglePlay(){

var s=ytPlayer.getPlayerState()

if(s==1){
ytPlayer.pauseVideo()
}else{
ytPlayer.playVideo()
}

}

function openLang(){
alert("اختيار اللغة")
}

function extractYT(url){

var m=url.match(/v=([^&]+)/)

if(m)return m[1]

return url

}

function init(){

var urlParams=new URLSearchParams(location.search)

var yt=urlParams.get("yt")

if(!yt)return

var id=extractYT(yt)

var tag=document.createElement('script')
tag.src="https://www.youtube.com/iframe_api"
document.head.appendChild(tag)

window.onYouTubeIframeAPIReady=function(){

loadYT(id)

}

}

init()

</script>

</body>
</html>
