:root{--green:#1a472a;--green-md:#2d6a4f;--green-lt:#40916c;--gold:#c9a84c;--gold-lt:#e9c46a;--silver:#b0b7c3;--white:#f0ece4;--bg:#0a0e0b;--bg2:#0f1610;--bg3:#141d15;--bg4:#1a2419;--border:rgba(201,168,76,.15);}*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;overflow:hidden;}body{background:var(--bg);color:var(--white);font-family:'Tajawal',sans-serif;}
#loader{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}#loader.hide{display:none;}
.ld-ring{position:relative;width:60px;height:60px;} .ld-ring::before{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--gold);animation:spin 1.2s linear infinite;}
.ld-ring::after{content:'';position:absolute;inset:8px;border-radius:50%;border:1px solid transparent;border-bottom-color:var(--green-lt);animation:spin 2s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg)}}
#no-live{position:fixed;inset:0;z-index:400;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:20px;}#no-live.show{display:flex;}
#player-wrap{position:fixed;inset:0;background:#000;}#yt-frame{position:absolute;inset:0;width:100%;height:100%;}#sub-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;}
#black-screen{position:absolute;inset:0;z-index:8;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;}#black-screen.hide{display:none;}
#watch-header,#controls{opacity:0;transition:opacity .3s;pointer-events:none;}#watch-header.visible,#controls.visible{opacity:1;pointer-events:all;}
/* باقي الـ CSS كما هو (لتوفير المساحة لم أكرره هنا لكن في النسخة الفعلية هو كامل) */

function createYTPlayer(videoId){
  document.getElementById('yt-frame').innerHTML='';
  ytPlayer = new YT.Player('yt-frame',{
    videoId:videoId,
    playerVars:{autoplay:1,controls:0,rel:0,modestbranding:1,iv_load_policy:3,disablekb:1,fs:0,playsinline:1},
    events:{
      onReady:function(e){
        e.target.setVolume(ST.vol);
        e.target.playVideo();
        ST.playing=true;
        updatePlayIcon();
        startLoop();
        document.getElementById('black-screen').classList.add('hide');
        document.getElementById('yt-frame').style.opacity='1';
      },
      onStateChange:function(e){
        if(e.data===YT.PlayerState.PLAYING){ST.playing=true;updatePlayIcon();document.getElementById('black-screen').classList.add('hide');}
        if(e.data===YT.PlayerState.PAUSED||e.data===YT.PlayerState.ENDED){ST.playing=false;updatePlayIcon();document.getElementById('black-screen').classList.remove('hide');}
      }
    }
  });
}
